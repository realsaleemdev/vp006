</head>
<body>
  <div class="container">
    <div class="content">
      <div class="left-side">
        <div class="details">
          <i class="fas fa-map-marker-alt"></i>
          <div class="topic">Address</div>

        <div class="details">

          <div class="text-one">+923701746511</div>
          <div class="text-two">+923294936295</div>

          <div class="text-one">muhammadsaleem03434@gmail.com</div>
          <div class="text-two">saleembinyousaf006@gmail.com</div>

          </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
